name: Pytest

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --extra wandb

      - name: Run fast test suite
        run: uv run pytest -m "not slow" tests/
