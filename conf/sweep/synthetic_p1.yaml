# @package _global_
#
# Phase-1 hyperparameter sweep for synthetic datasets.
# Cheap to run: each trial takes ~1-2 min on CPU.
#
# Usage (local, sequential):
#   python train.py --multirun \
#     dataset=synthetic \
#     dataset.mode=lgssm \
#     +sweep=synthetic_p1 \
#     hydra/sweeper=optuna \
#     "++hydra.sweeper.storage=sqlite:///runs/optuna/synthetic_p1.db"
#
# Usage (SLURM):
#   python train.py --multirun \
#     dataset=synthetic dataset.mode=harmonic \
#     +sweep=synthetic_p1 \
#     hydra/launcher=submitit_slurm \
#     hydra/sweeper=optuna \
#     "++hydra.sweeper.storage=sqlite:////shared/runs/optuna/synthetic_p1.db"

# Short sweep trials
steps: 300
seq_len: 32
split: 16
do_eval: true
quiet: true

model_configs:
  - configs/synthetic_gauss.yaml

hydra:
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper

    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      n_startup_trials: 5

    direction: minimize
    storage: null
    study_name: ddssm_synthetic_p1
    n_trials: 20
    n_jobs: 1

    params:
      hp.vae_lr: tag(log, interval(1e-5, 1e-3))
      hp.trans_lr: tag(log, interval(1e-5, 3e-4))
      hp.lambda_warmup_steps: range(10, 300)
      hp.lambda_end: tag(log, interval(0.5, 2.0))
      hp.weight_decay: tag(log, interval(1e-5, 1e-2))
      hp.batch_size: choice(32, 64)
