# @package _global_
#
# Phase-1 hyperparameter sweep for the KDD experiment.
# Tunes encoder/decoder/init-prior hyperparameters using Optuna TPE.
#
# Usage (local, sequential):
#   python train.py --multirun \
#     +sweep=kdd_p1 \
#     hydra/sweeper=optuna \
#     "++hydra.sweeper.storage=sqlite:///runs/optuna/kdd_p1.db"
#
# Usage (SLURM, parallel jobs):
#   python train.py --multirun \
#     +sweep=kdd_p1 \
#     hydra/launcher=submitit_slurm \
#     hydra/sweeper=optuna \
#     "++hydra.sweeper.storage=sqlite:///runs/optuna/kdd_p1.db" \
#     "++hydra.launcher.partition=gpu"

# Override training defaults for fast sweep trials
steps: 1000
seq_len: 32
split: 16
do_eval: true
quiet: true

# Use the smaller single-station config for cheaper sweep runs
model_configs:
  - configs/kdd_gauss_single.yaml

hydra:
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper

    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 123
      n_startup_trials: 10

    direction: minimize
    # storage: set at CLI with ++hydra.sweeper.storage='sqlite:///...'
    storage: null
    study_name: ddssm_kdd_p1
    n_trials: 50
    n_jobs: 1

    params:
      # VAE learning rate (enc / dec / zinit share the same LR)
      hp.vae_lr: tag(log, interval(1e-5, 1e-3))
      hp.trans_lr: tag(log, interval(1e-5, 3e-4))
      hp.lambda_warmup_steps: range(1, 750)
      hp.lambda_end: tag(log, interval(0.7, 2.0))
      hp.weight_decay: tag(log, interval(1e-5, 1e-2))
      hp.batch_size: choice(32)
      hp.S_k: choice(4)
      hp.k_chunk: choice(4)
