# Single-stage training scalars consumed by ``ddssm.app``.
#
# These are the runtime knobs for ``DDSSMTrainer.fit(...)``. The DDSSM
# multi-stage Pydantic ``stages`` machinery (``DDSSMConfig.stages``) is a
# separate concept used by the legacy script entry points and is not driven
# from this config group.

# Number of optimizer steps (one step per gradient update, inclusive of
# gradient accumulation handled inside the trainer).
steps: 1000

# Per-step training metrics are flushed every ``log_every`` steps.
log_every: 50

# Validation cadence in optimizer steps. Set to 0 to disable validation
# (the matching ``${dataset_val}`` group is only honoured when > 0).
validate_every: 0

# Checkpoint cadence in optimizer steps. Null disables periodic checkpoints
# while still honouring on-interrupt and on-completion saves.
checkpoint_every: null

# Optional checkpoint filename prefix used by ``DDSSMTrainer``.
checkpoint_prefix: null

# Toggle automatic mixed precision.
amp: false

# Toggle ``torch.profiler`` capture inside ``fit``. Steps argument is
# forwarded; 0 disables profiling entirely.
profile_steps: 0

# DataLoader knobs for the synthetic / generic-Dataset path.
num_workers: 0
shuffle: true
pin_memory: false
drop_last: false

# Optional path to a checkpoint to resume training from.
resume_from: null

# When true the final mean training loss (computed from CSV metric history)
# is returned from ``main`` so Optuna can use it directly as an objective.
return_objective: true
