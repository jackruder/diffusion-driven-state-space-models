# @package _global_
#
# Experiment preset: synthetic-data DDSSM with a diffusion transition prior.
# Mirrors ``synthetic_gauss`` but swaps the transition group and bumps the
# step budget since the diffusion model is heavier.
#
# Usage::
#
#     python -m ddssm.app +experiment=synthetic_diffusion

defaults:
  - override /transition: diffusion
  - override /dataset: synthetic
  - _self_

data_dim: 1
latent_dim: 4
j: 1
emb_time_dim: 16
covariate_dim: 0
use_observation_mask: false

dataset:
  mode: lgssm
  T: 64
  N_per_split: 512

hyperparams:
  batch_size: 32
  grad_accum_steps: 1
  lambda_schedule: cosine
  lambda_start: 0.001
  lambda_end: 1.0
  lambda_warmup_steps: 300
  enc_lr: 5e-4
  dec_lr: 5e-4
  zinit_lr: 5e-4
  trans_lr: 5e-4
  S: 1

training:
  steps: 1000
  log_every: 25
  amp: false
