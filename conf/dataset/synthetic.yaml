# Synthetic time-series dataset (in-tree, no external data required).
#
# Selectable modes match ``SyntheticDataset`` (e.g. ``iid``, ``lgssm``,
# ``nonlinear``, ``nongaussian``, ``bimodal-block``, ``robot-basis-pursuit``,
# ``student_t``).  Dimensions ``D`` and ``T`` are interpolated from root
# config keys so the dataset stays consistent with the model wiring.

_target_: ddssm.data.synthetic.SyntheticDataset
mode: lgssm
split: train
N_per_split: 1024
T: 100
D: ${data_dim}
dataset_seed: 1234
