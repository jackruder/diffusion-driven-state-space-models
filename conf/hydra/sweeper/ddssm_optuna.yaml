# Project default for Hydra multiruns backed by Optuna.
#
# This config intentionally only contains reusable sweeper defaults. Keep
# concrete study/search-space definitions in external experiment files or CLI
# overrides rather than adding hundreds of per-experiment configs under conf/.

_target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper

defaults:
  - sampler: tpe

direction: minimize
# Relative SQLite URLs are resolved from Hydra's runtime working directory.
# Override this with an absolute sqlite:/// path for shared or CI studies.
storage: sqlite:///ddssm_default_study.db
study_name: ddssm
n_trials: 20
n_jobs: 1
max_failure_rate: 0.0
search_space: null
params: {}
custom_search_space: null
