# @package _global_
#
# Top-level Hydra configuration for DDSSM training.
# Compose datasets and model configs; override any key at the CLI.
#
# Single run (local):
#   python train.py dataset=kdd steps=5000
#
# SLURM sweep (phase 1):
#   python train.py --multirun \
#     +sweep=kdd_p1 \
#     hydra/launcher=submitit_slurm \
#     "++hydra.sweeper.storage=sqlite:///runs/optuna/kdd_p1.db"

defaults:
  - dataset: kdd
  - _self_

# ---------------------------------------------------------------------------
# Model architecture: paths to YAML files merged left-to-right.
# Each file must be a valid partial or full DDSSMConfig YAML.
# Overrides are applied on top of the merged result.
# ---------------------------------------------------------------------------
model_configs:
  - configs/kdd_gauss_single.yaml

# ---------------------------------------------------------------------------
# Training run parameters
# ---------------------------------------------------------------------------
steps: 1000
seq_len: 32
split: 16
profile_steps: 0
quiet: true

# ---------------------------------------------------------------------------
# Hyperparameter overrides applied on top of model_configs.
# null (or ~) means "keep the value from model_configs".
# vae_lr is a shorthand that sets enc_lr, dec_lr, and zinit_lr together
# (individual keys take precedence if also set; a warning is emitted when both
# are provided simultaneously).
#
# Adding a new HP here is sufficient — no change to _collect_overrides() in
# train.py is required, because all hp.* keys are auto-forwarded to
# DDSSMConfig.hyperparams.<key> unless they appear in the special-case list
# (currently only S_k and k_chunk, which map to transition.schedule.*).
# ---------------------------------------------------------------------------
hp:
  batch_size: ~
  lambda_schedule: ~
  lambda_warmup_steps: ~
  lambda_end: ~
  vae_lr: ~       # shorthand: enc_lr = dec_lr = zinit_lr = vae_lr
  enc_lr: ~
  dec_lr: ~
  zinit_lr: ~
  trans_lr: ~
  weight_decay: ~
  S: ~
  S_k: ~
  k_chunk: ~

# ---------------------------------------------------------------------------
# Architecture overrides (pain point 2).
# Keys are forwarded as dot-notation overrides directly to DDSSMConfig so that
# model architecture fields can be set from the CLI or Optuna sweep configs
# without maintaining separate YAML files.
#
# Examples:
#   python train.py arch.encoder.hidden_dim=128
#   python train.py arch.transition.hidden_dim=64 arch.latent_dim=4
#
# Entries must use the full DDSSMConfig dot-path (e.g. "encoder.hidden_dim",
# "transition.schedule.num_steps").  Use ~ to leave a field unchanged.
# ---------------------------------------------------------------------------
arch: {}

# ---------------------------------------------------------------------------
# Evaluation (set do_eval=true to run after training; required for sweeps)
# ---------------------------------------------------------------------------
do_eval: false
forecast_samples: 20
eval_seed: 123

# ---------------------------------------------------------------------------
# Divergence pruning (only active when do_eval=true and Optuna is available)
# ---------------------------------------------------------------------------
prune_spike_factor: 5.0
prune_tail_fraction: 0.2

# ---------------------------------------------------------------------------
# Weights & Biases logging.
# Set wandb.enabled=true to activate.  Point wandb.base_url at your own
# server for self-hosted W&B (equivalent to WANDB_BASE_URL env var).
# ---------------------------------------------------------------------------
wandb:
  enabled: false
  project: ddssm
  entity: ~          # null → use W&B default entity / env var WANDB_ENTITY
  name: ~            # null → derived from Hydra override dirname; W&B auto-generates if empty
  group: ~           # null → derived from Optuna study_name when running a sweep
  tags: []
  base_url: ~        # e.g. "https://wandb.example.com" for a self-hosted server

# ---------------------------------------------------------------------------
# Hydra output / sweep directory layout
# ---------------------------------------------------------------------------
hydra:
  run:
    dir: runs/${hydra.job.name}/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: runs/sweep/${now:%Y%m%d_%H%M%S}
    subdir: trial_${hydra.job.num}
  job:
    chdir: true
