# transition/diffusion.yaml – Diffusion transition config group option

transition:
  _target_: ddssm.transitions.diffusion.DiffusionTransition
  latent_dim: ${latent_dim}
  j: ${j}
  emb_time_dim: ${emb_time_dim}
  covariate_dim: ${covariate_dim}
  # UNet architecture
  unet_channels: 64
  unet_n_layers: 4
  unet_embedding_dim: 128
  unet_time_type: conv
  unet_feature_type: transformer
  unet_feature_nheads: 8
  unet_feature_n_layers: 1
  # Diffusion schedule
  S_k: 1
  k_chunk: 1
  num_steps: 100
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  k_sampling_mode: uniform
  pk_gamma: 1.0
  pk_floor: 1.0e-12
