# Top-level Hydra config for DDSSM.
#
# All experiment-specific wiring (data module, model, transition,
# hyperparameters, training scalars, objective) lives inside
# ``cfg.experiment``. The default selects the small Synthetic + Gaussian
# preset for smoke tests; pick another preset with ``experiment=NAME``
# (see ``ddssm.conf`` for the registered names).

defaults:
  - experiment: synthetic_gauss
  - transition: gaussian
  - wandb: disabled
  - _self_
