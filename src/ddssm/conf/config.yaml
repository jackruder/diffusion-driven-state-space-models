# Top-level Hydra config for DDSSM.
#
# Experiments are composed in Python under ``experiments/`` and
# registered via :func:`experiments._make.experiment`. The default is
# the canonical init-centering anchor cell; switch with
# ``experiment=NAME``. To tweak a knob, override on the CLI with dotted
# paths, e.g. ``experiment.training.steps=200``.

defaults:
  - experiment: init_smoke_simple
  - wandb: disabled
  - _self_
