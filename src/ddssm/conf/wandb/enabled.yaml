# @package experiment.wandb_config
#
# W&B is opt-in. Activate with ``wandb=enabled``. Override any of the
# fields at the CLI, e.g.::
#
#     python -m ddssm.app wandb=enabled \
#         experiment.wandb_config.project=my-project \
#         experiment.wandb_config.entity=my-team \
#         'experiment.wandb_config.tags=[recon,synth]'
#
# Identity is auto-derived from Hydra so multirun trials cluster nicely
# in the W&B UI:
#   - ``group``: Optuna study name (or a sane fallback for non-sweeps)
#   - ``name``:  Hydra job override dirname (unique per multirun trial)

enabled: true
project: ddssm
entity: null
name: ${hydra:job.override_dirname}
group: ${oc.select:hydra.sweeper.study_name,${hydra:job.name}}
tags: []
config: {}
base_url: null
# ``wandb.watch`` is opt-in — set to ``"gradients"``, ``"parameters"``,
# or ``"all"`` to log per-tensor histograms alongside scalars. Costs
# extra bandwidth, hence off by default.
watch_log: null
watch_log_freq: 100
