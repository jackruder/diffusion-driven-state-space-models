# Multi-objective Optuna sweeper preset (NSGA-III sampler under the hood
# in optuna>=4.x when ``direction`` is a list).
#
# Used by Round-1 init-centering sweeps that optimise
#   (wallclock_to_target_seconds, stage2_elbo_surrogate)
# jointly. ``Experiment.objective`` must be configured as a
# ``list[ObjectiveSpec]`` whose length matches ``direction``.
#
# Reuses the absolute-path storage convention from ``ddssm_optuna.yaml``
# so multiple workers can share one SQLite study.

_target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper

defaults:
  - sampler: nsgaii

direction: [minimize, minimize]
storage: sqlite:///${oc.env:PWD,.}/runs/optuna/${hydra:sweeper.study_name}.db
study_name: ddssm_moo
n_trials: 20
n_jobs: 1
max_failure_rate: 0.0
search_space: null
params: {}
custom_search_space: null
