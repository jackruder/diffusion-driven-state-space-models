# Project default for Hydra multiruns backed by Optuna.
#
# Reusable defaults only; concrete search spaces live in ``conf/sweep/*``
# or are passed as CLI overrides.
#
# IMPORTANT: ``storage`` defaults to an absolute path under ``$PWD``.
# Relative ``sqlite:///...`` URLs are resolved from each trial's runtime
# working directory, which silently fragments the study (each trial
# opens its own DB). Override with an absolute path or a network URL
# for shared / CI studies.

_target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper

defaults:
  - sampler: tpe
  - _self_

direction: minimize
storage: sqlite:///${oc.env:PWD,.}/runs/optuna/${hydra:sweeper.study_name}.db
study_name: ddssm
n_trials: 20
# n_jobs > 1 spawns Optuna workers via joblib threads in one process;
# wandb.init is not thread-safe, so use the SLURM/Submitit launcher for
# real parallelism instead.
n_jobs: 1
max_failure_rate: 0.0
search_space: null
params: {}
custom_search_space: null
# Default sampler seed for a SINGLE-process run (reproducible re-exploration).
# NOTE: distributed launches (``ddssm.launch`` packed/multi-worker) MUST override
# this PER WORKER — else every worker builds its sampler from seed=42 and draws
# the IDENTICAL trial sequence, collapsing a cell's trials to duplicate configs.
# The launcher injects ``hydra.sweeper.sampler.seed=<SLURM_JOB_ID-derived int>``
# per worker (see ``ddssm.launch._SAMPLER_SEED_OVERRIDE``). Override manually via
# ``hydra.sweeper.sampler.seed=N``.
sampler:
  seed: 42
