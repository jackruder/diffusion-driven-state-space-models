# Hydra submitit SLURM launcher defaults.
# Override any key at the CLI with ++hydra.launcher.<key>=<value>.
#
# Reference:
#   https://hydra.cc/docs/plugins/submitit_launcher/

_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher

# Directory where submitit writes job scripts and logs.
# ${hydra.sweep.dir} is the top-level sweep output directory.
submitit_folder: ${hydra.sweep.dir}/submitit/%j

# --- Resource requests ---
partition: gpu
timeout_min: 720       # 12 hours
gpus_per_node: 1
cpus_per_task: 4
mem_gb: 32
nodes: 1

# --- Submitit / SLURM extras ---
# Increase max_num_timeout to allow more retries on preemptible partitions.
max_num_timeout: 3

# Comment this line or set to null to disable email notifications.
# comment: "DDSSM sweep job"
