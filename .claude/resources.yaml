# DDSSM compute resource profiles.
# Edited via /compute-resources. Consumed by /compute-budget and /plan-campaign.
#
# `count` semantics differ for local vs SLURM profiles:
#   - local: number of devices physically present
#   - SLURM: number of GPUs requested per single job allocation
#   - `count_max`: max concurrent GPUs across all jobs (SLURM only)
#
# Cluster (all slurm-* profiles): Tempest (Montana State University)
#   login: tempest-login   (user: see .claude/cluster.local.env → CLUSTER_NETID)
#   account is PER-PARTITION: gpupriority → priority-michaelwojnowicz,
#   gpuunsafe → group-michaelwojnowicz (wrong account → PartitionConfig).
#   environment: lmod modules (no nix). uv is a module — no bootstrap.
#   Setup steps for cluster runs:
#     module load Python/3.13.5-GCCcore-14.3.0 CUDA/13.0.0 tools/uv/0.9.22
#     uv sync               # uv.lock pins nvidia-cudnn-cu13 + cublas 13.x
#   The PyTorch wheel index needs no override — uv.lock already targets cu13.
#   GRES is type-qualified: request gpu:a100:1 or gpu:a40:1 (a bare gpu:1
#   can land the wrong GPU type). Partition split: A100 → gpupriority
#   (non-preemptible), A40 → gpuunsafe (preemptible, use --requeue).

profiles:

  workstation:
    description: "Primary dev box (hostname: compute) — single RTX 4090"
    devices:
      - kind: gpu
        name: "NVIDIA GeForce RTX 4090"
        count: 1
        memory_gb: 24
        compute_capability: "8.9"
    availability: exclusive
    storage:
      runs_dir: runs/
      scratch: /tmp/ddssm
      optuna_db_dir: runs/optuna/
      shared_fs: false
    notes:
      - "Intel i5-13600K, 20 threads, 31 GiB RAM"
      - "1.8 TB free on /home; repo on same volume"

  slurm-a100:
    description: "1× A100 80 GB on the gpupriority partition (non-preemptible)"
    devices:
      - kind: gpu
        name: "NVIDIA A100"
        count: 1                              # GPUs per job allocation
        count_max: 1                          # confirmed: exactly 1 A100 on gpupriority
        memory_gb: 80
        compute_capability: "8.0"
    availability: slurm-queued
    slurm:
      partition: gpupriority
      account: priority-michaelwojnowicz
      gres: gpu:a100:1                        # type-qualified — pins the A100
      qos: null
      timeout_min_default: 720                # 12:00:00 per user default
      cpus_per_task: 4
      mem_gb: 64
      preempt_window_s: null                  # not preemptible
      max_jobs_concurrent: 1                  # confirmed: 1 A100 slot on gpupriority
      array_limit: null                       # TODO: confirm
    setup:
      - "module load Python/3.13.5-GCCcore-14.3.0 CUDA/13.0.0 tools/uv/0.9.22"
      - "source ~/diffusion-driven-state-space-models/.venv/bin/activate   # or: uv run ..."
    storage:
      runs_dir: ~/diffusion-driven-state-space-models/runs
      scratch: ~/diffusion-driven-state-space-models/scratch
      optuna_db_dir: ~/diffusion-driven-state-space-models/runs/optuna
      shared_fs: true                         # confirmed: cluster FS visible across nodes
    notes:
      - "Use for high-value single-experiment runs; not the right pool for big sweeps."
      - "Storage on /home (no /scratch quota headroom confirmed) — watch the home quota; torch venv is ~5 GB."

  slurm-a40-priority:
    description: "1× A40 on gpupriority (non-preemptible) — the single non-preempt A40 slot"
    devices:
      - kind: gpu
        name: "NVIDIA A40"
        count: 1                              # GPUs per job allocation
        count_max: 1                          # confirmed: exactly 1 A40 on gpupriority
        memory_gb: 48
        compute_capability: "8.6"
    availability: slurm-queued
    slurm:
      partition: gpupriority
      account: priority-michaelwojnowicz
      gres: gpu:a40:1                         # type-qualified
      qos: null
      timeout_min_default: 720
      cpus_per_task: 4
      mem_gb: 64
      preempt_window_s: null                  # not preemptible
      max_jobs_concurrent: 1                  # confirmed: 1 A40 slot on gpupriority
      array_limit: null                       # TODO: confirm
    setup:
      - "module load Python/3.13.5-GCCcore-14.3.0 CUDA/13.0.0 tools/uv/0.9.22"
      - "source ~/diffusion-driven-state-space-models/.venv/bin/activate   # or: uv run ..."
    storage:
      runs_dir: ~/diffusion-driven-state-space-models/runs
      scratch: ~/diffusion-driven-state-space-models/scratch
      optuna_db_dir: ~/diffusion-driven-state-space-models/runs/optuna
      shared_fs: true
    notes:
      - "Confirmed (2026-05-27): gpupriority gives exactly 1 A100 + 1 A40, both"
      - "non-preemptible. This profile is that single A40 slot — use it for the"
      - "one A40 cell you most want immune to preemption; bulk A40 work goes to"
      - "slurm-a40-preempt (gpuunsafe, unlimited)."

  slurm-a40-preempt:
    description: "A40 on gpuunsafe (preemptible, unlimited concurrent) — big sweeps with resume"
    devices:
      - kind: gpu
        name: "NVIDIA A40"
        count: 1                              # GPUs per job allocation
        count_max: 999                        # unlimited per user (no account cap); sane ceiling only
        memory_gb: 48
        compute_capability: "8.6"
    availability: preemptible
    slurm:
      partition: gpuunsafe
      account: group-michaelwojnowicz         # gpuunsafe requires the group- account, not priority-
      gres: gpu:a40:1                         # type-qualified
      qos: null
      timeout_min_default: 720
      cpus_per_task: 4
      mem_gb: 64
      preempt_window_s: null                  # UNKNOWN — depends on cluster load
      max_jobs_concurrent: 999                # unlimited jobs on gpuunsafe (confirmed 2026-05-27)
      array_limit: null                       # TODO: confirm
    setup:
      - "module load Python/3.13.5-GCCcore-14.3.0 CUDA/13.0.0 tools/uv/0.9.22"
      - "source ~/diffusion-driven-state-space-models/.venv/bin/activate   # or: uv run ..."
    storage:
      runs_dir: ~/diffusion-driven-state-space-models/runs
      scratch: ~/diffusion-driven-state-space-models/scratch
      optuna_db_dir: ~/diffusion-driven-state-space-models/runs/optuna
      shared_fs: true
    notes:
      - "Canonical A40 pool per the user (2026-05-27): A40 sweeps run here."
      - "Submit with `#SBATCH --requeue` so a preempted job restarts and its"
      - "fresh workers resume from the shared Optuna DB (completed trials persist)."
      - "Preempt window not measured; can vary widely with cluster load."
      - "Per `project-handoff-protocol-invariants`: parametric μ_p needs an"
      - "uninterrupted stage-1, so preempt during stage-1 can leave a *learnable*"
      - "μ_p un-converged. Round-1 cells are baseline_mode=pinned (μ_p fixed), so a"
      - "preempt-restart is safe; revisit this for learnable-μ_p cells."

  laptop-cpu:
    description: "Mobile CPU fallback for tiny smoke runs"
    devices:
      - kind: cpu
        name: "Intel Core i5-1240P"
        count: 1
        memory_gb: 32
    availability: exclusive
    storage:
      runs_dir: runs/
      scratch: /tmp/ddssm
      optuna_db_dir: runs/optuna/
      shared_fs: false
    notes:
      - "CPU-only — for smoke runs and quick verification, not training."
      - "Expect ≥ 10× slower per-step than workstation; pick presets accordingly."

defaults:
  active_profile: slurm-a40-preempt          # A40 work runs on gpuunsafe per user directive
  fallback_profile: workstation
